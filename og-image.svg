<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Roberto Guadarrama Fotografia</title>
  <desc id="desc">Fotografo en Iguala, Guerrero. XV anos, bodas, sesiones y negocios.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141210" />
      <stop offset="100%" stop-color="#0d0c0a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8d5a8" />
      <stop offset="100%" stop-color="#9a7a45" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="170" cy="120" r="180" fill="#c8a96e" opacity="0.08" />
  <circle cx="1080" cy="520" r="230" fill="#c8a96e" opacity="0.08" />
  <rect x="90" y="90" width="1020" height="450" rx="28" fill="none" stroke="#c8a96e" stroke-opacity="0.35" />
  <text x="120" y="210" fill="#c8a96e" font-family="Georgia, serif" font-size="42" letter-spacing="8">IGUALA, GUERRERO</text>
  <text x="120" y="318" fill="#faf6ef" font-family="Georgia, serif" font-size="88">Roberto Guadarrama</text>
  <text x="120" y="402" fill="url(#accent)" font-family="Georgia, serif" font-size="64">El Fotografo</text>
  <text x="120" y="472" fill="#d8d0c4" font-family="Arial, sans-serif" font-size="34">XV anos, bodas, sesiones y contenido para negocios</text>
  <text x="120" y="525" fill="#d8d0c4" font-family="Arial, sans-serif" font-size="30">Cotizaciones directas por WhatsApp</text>
</svg>
